services:
  nextcloud:
    image: nextcloud:latest
    container_name: lazycoffee-nextcloud
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - /mnt/storage/nextcloud:/var/www/html
    environment:
      - POSTGRES_HOST=nextcloud-db
      - REDIS_HOST=nextcloud-redis

  nextcloud-db:
    image: postgres:16
    container_name: lazycoffee-nextcloud-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=change_this_password
    volumes:
      - nextcloud_db:/var/lib/postgresql/data

  nextcloud-redis:
    image: redis:alpine
    container_name: lazycoffee-nextcloud-redis
    restart: unless-stopped

volumes:
  nextcloud_db:
